services:
  - type: web
    name: 5starrealty
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    disk:
      name: site-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data/app-data
      - key: UPLOADS_DIR
        value: /var/data/uploads
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD_HASH
        sync: false
