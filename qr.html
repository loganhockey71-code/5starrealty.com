<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scan to view on phone</title>
<style>
  body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f7f5f2; }
  .card { background: #fff; border-radius: 16px; padding: 48px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.10); max-width: 400px; width: 90%; }
  img { width: 260px; height: 260px; display: block; margin: 0 auto 24px; }
  h1 { font-size: 1.4rem; margin: 0 0 8px; color: #1a1714; }
  p  { color: #5b554e; font-size: 1rem; margin: 0 0 20px; }
  a  { color: #836524; font-weight: 600; font-size: 1rem; word-break: break-all; }
</style>
</head>
<body>
  <div class="card">
    <h1>5 Star Realty</h1>
    <p>Scan with your phone's camera</p>
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=260x260&margin=10&data=http%3A%2F%2F10.0.0.224%3A8000" alt="QR code for 5 Star Realty site">
    <p style="margin-top:16px;font-size:0.9rem;color:#8a847c;">Make sure your phone is on the same Wi-Fi network</p>
    <a href="http://10.0.0.224:8000">http://10.0.0.224:8000</a>
  </div>
<script src="js/cookies.js"></script>
</body>
</html>
